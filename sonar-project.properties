# SonarCloud project configuration.
# Project: https://sonarcloud.io/project/overview?id=Safronus_ctyrlistkoteka

sonar.projectKey=Safronus_ctyrlistkoteka
sonar.organization=safronus

# ---------------------------------------------------------------------------
# Files excluded from analysis entirely (generated / not part of the app)
# ---------------------------------------------------------------------------
# Prisma migrations are generated PostgreSQL DDL. SonarCloud's PL/SQL engine
# misreads them as Oracle and raises CHAR-vs-VARCHAR2 "bugs" plus varchar-size
# warnings — 31 findings, all false positives on Postgres syntax Prisma emits
# and we never hand-edit.
sonar.exclusions=prisma/migrations/**

# ---------------------------------------------------------------------------
# Security false positives — reviewed, marked "Safe / False Positive" in the
# SonarCloud UI (Issues tab), NOT here.
# ---------------------------------------------------------------------------
# Per-rule `sonar.issue.ignore.multicriteria` directives were removed from this
# file: SonarCloud Automatic Analysis treats the resourceKey glob (e.g.
# `**/*.tsx`) as a REGEX, where `**` is invalid ("nothing to repeat"), and it
# fails the entire analysis. The supported path for Automatic Analysis is to
# mark each issue Safe/False-Positive on the issue itself (which also leaves an
# audit trail). For the record, each of the following was reviewed and judged
# a false positive in THIS codebase's context:
#
#   S2245  Math.random         UI/display randomness only (shuffling facts,
#                              picking a photo) — never a token or key. Security
#                              codes use crypto.getRandomValues
#                              (unlock-code-panel.tsx#generateCode).
#   S4790  SHA-1               Fast digest, not a security primitive:
#                              images.ts content-addresses generated files;
#                              votes.ts builds a SALTED dedup fingerprint.
#   S2068  "hard-coded pwd"    iron-session `password:` KEY name; value read
#                              from env with a dev-only fallback.
#   S6418  TOKEN_ALPHABET      Public, human-legible QR char set, not a secret.
#   S4036  OS PATH lookup      Build-time `git rev-list` + admin-only
#                              `pm2 restart` with a hard-coded process name.
#   S8707  agentic path-inj.   Fires on scripts/prepare-upload.ts, a local Mac
#                              pre-rsync tool — no externally-controlled input.
