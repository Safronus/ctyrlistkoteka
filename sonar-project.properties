# SonarCloud project configuration.
# Project: https://sonarcloud.io/project/overview?id=Safronus_ctyrlistkoteka
#
# This file documents, IN VERSION CONTROL, every analyzer finding we have
# deliberately silenced and WHY — so the suppression list is auditable in a
# public repo instead of hidden behind UI clicks. Everything ignored here was
# reviewed and judged a false positive in this codebase's context.

sonar.projectKey=Safronus_ctyrlistkoteka
sonar.organization=safronus

# ---------------------------------------------------------------------------
# Files excluded from analysis entirely (generated / not part of the app)
# ---------------------------------------------------------------------------
# Prisma migrations are generated PostgreSQL DDL. SonarCloud's PL/SQL engine
# misreads them as Oracle and raises CHAR-vs-VARCHAR2 "bugs" plus varchar-size
# warnings — 31 findings, all false positives on Postgres syntax Prisma emits
# and we never hand-edit.
sonar.exclusions=prisma/migrations/**

# ---------------------------------------------------------------------------
# Per-rule false positives kept in place (reviewed — safe in this context)
# ---------------------------------------------------------------------------
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7

# S2245 — pseudo-random generator. Every hit is UI/display randomness
# (shuffling clover facts, picking a screensaver photo). None feeds a token,
# key, or anything an attacker can race. Security-grade codes use
# crypto.getRandomValues (see unlock-code-panel.tsx#generateCode).
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S2245
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.tsx

# S4790 — SHA-1. Used as a fast digest, never as a security primitive:
# images.ts content-addresses generated files by hash (changing the algo
# would rename thousands of files); votes.ts builds a SALTED dedup
# fingerprint (not a password, not adversary-collision-sensitive).
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S4790
sonar.issue.ignore.multicriteria.e2.resourceKey=src/lib/images.ts
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S4790
sonar.issue.ignore.multicriteria.e3.resourceKey=src/lib/votes.ts

# S2068 — "hard-coded password". The flagged line is the iron-session
# `password:` KEY name; the value is read from env with a dev-only fallback.
# No secret lives in source.
sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e4.resourceKey=src/lib/admin/session.ts

# S6418 — "hard-coded secret". TOKEN_ALPHABET is a public, human-legible
# character set for QR tokens (no 0/O/1/l/I), not a credential.
sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S6418
sonar.issue.ignore.multicriteria.e5.resourceKey=src/app/admin/qr/qr-actions.ts

# S4036 — OS-command PATH lookup. Two call sites: build-time `git rev-list`
# (next.config.ts) and an admin-only `pm2 restart` with a hard-coded process
# name (pm2-restart-action.ts). Neither takes untrusted input.
sonar.issue.ignore.multicriteria.e6.ruleKey=typescript:S4036
sonar.issue.ignore.multicriteria.e6.resourceKey=**/*.ts

# S8707 — "agentic workflow path injection". Fires on scripts/prepare-upload.ts,
# a LOCAL Mac pre-rsync tool that walks the operator's own filesystem. Not an
# agent, not deployed, no externally-controlled path input.
sonar.issue.ignore.multicriteria.e7.ruleKey=tssecurity:S8707
sonar.issue.ignore.multicriteria.e7.resourceKey=scripts/prepare-upload.ts
