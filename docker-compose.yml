services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ctyrlistkoteka-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ctyrlist
      POSTGRES_PASSWORD: ctyrlist_dev
      POSTGRES_DB: ctyrlistkoteka
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctyrlist -d ctyrlistkoteka"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ctyrlistkoteka-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # pro lokální vývoj stačí bez auth; produkce má Redis bez network exposure
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]

volumes:
  postgres_data:
