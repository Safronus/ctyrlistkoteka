# fail2ban custom action — append banované IP do nginx deny snippetu
# v reálném čase. Doplňuje pomalou cestu (denní cron blocklist-tools.sh
# nginx-deny --apply), aby IP byly trvale blokované od první vteřiny po
# fail2ban banu, ne až po nejbližším rebuild.
#
# Per-jail wiring: vlož `permaban-nginx` do action sekce jail definice
# (vedle `blocklist`, ne místo něj), např.:
#
#   [nginx-noscript]
#   action = %(action_)s
#            blocklist
#            permaban-nginx
#
# Umístění souboru: /etc/fail2ban/action.d/permaban-nginx.conf
# Po úpravě:        sudo fail2ban-client reload
#
# Pozn.: <ip> je fail2ban tag expandovaný runtime na zabanovanou IP.

[Definition]
actionstart =
actionstop =
actioncheck =
actionban   = /usr/local/sbin/permaban-nginx-add.sh '<ip>'
actionunban =

[Init]
# Žádné parametry, akce nepotřebuje konfiguraci za jail.
