# fail2ban jail pro útoky, které Nginx už dropuje (444), ale chceme
# útočníka rovnou na hodinu odstřihnout od portu, ať plivá doopravdy
# do prázdna a ušetříme i ten malý Nginx round-trip.
#
# Umístění souborů:
#   /etc/fail2ban/jail.d/nginx-noscript.conf      ← obsah níže (jail definice)
#   /etc/fail2ban/filter.d/nginx-noscript.conf    ← obsah z `nginx-noscript-filter.conf` v této složce
#
# Po každé úpravě:
#   sudo fail2ban-client reload
#   sudo fail2ban-client status nginx-noscript

# ---- jail.d/nginx-noscript.conf ----
[nginx-noscript]
enabled  = true
port     = http,https
filter   = nginx-noscript
logpath  = /var/log/nginx/access.log
# Read-only personal site bez login formulářů — nikdo legitimní si
# `/.env` ani `/wp-login.php` ručně nezkouší. 2 hity v rámci 10 minut
# z téže IP = jistý scanner. 24 h ban; opravdoví opakovači se přes
# TSV vyšplhají do permaban listu.
maxretry = 2
findtime = 600
bantime  = 86400

# Defaultní firewall ban PLUS náš logger pro permanent blocklist.
# `action_` je výchozí akce ze jail.local (typicky iptables-multiport).
# `blocklist` je naše custom action, která zapíše ban do TSV souboru
# /var/log/fail2ban-blocklist.tsv pro pozdější audit / permaban list.
action   = %(action_)s
           blocklist
