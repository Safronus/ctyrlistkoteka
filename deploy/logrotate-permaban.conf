# Rotace permaban-nginx-add.sh debug logu + cron rebuild log.
# Oba rostou pomalu (jeden řádek na ban / jeden run za den), ale bez
# rotace by za rok byl debug log v desítkách MB.
#
# Umístění: /etc/logrotate.d/permaban
# Práva:    sudo chmod 644, vlastník root:root

/var/log/permaban-nginx.log
/var/log/permaban-refresh.log {
    # Ubuntu má /var/log mode 0775 root:syslog — logrotate to bez
    # explicitní `su` direktivy považuje za nebezpečné a logy odmítne
    # rotovat. `su root syslog` mu řekne, ať pracuje pod root:syslog
    # (stejně jako defaultní /etc/logrotate.d/rsyslog snippet).
    su root syslog

    monthly
    rotate 12
    compress
    missingok
    notifempty
    # `adm` skupina má v Ubuntu read právo na všechny /var/log/*. Když
    # je app uživatel přidaný do adm, čte logy bez ACL — a logy přežijí
    # rotaci bez nutnosti re-applovat setfacl. Když app v adm není,
    # postrotate hook níž tam re-applikuje ACL pro app uživatele.
    create 644 root adm
    postrotate
        # No-op když ACL pro `app` uživatele není nastaveno (setfacl -x
        # by spadl). `|| true` zachrání rotation run, kdyby chybělo
        # ACL utility nebo příkaz vrátil non-zero.
        for f in /var/log/permaban-nginx.log /var/log/permaban-refresh.log; do
          [ -f "$f" ] && setfacl -m u:app:r "$f" 2>/dev/null || true
        done
    endscript
}
