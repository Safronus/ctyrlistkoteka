# Rotace permaban-nginx-add.sh debug logu + cron rebuild log.
# Oba rostou pomalu (jeden řádek na ban / jeden run za den), ale bez
# rotace by za rok byl debug log v desítkách MB.
#
# Umístění: /etc/logrotate.d/permaban
# Práva:    sudo chmod 644, vlastník root:root

/var/log/permaban-nginx.log
/var/log/permaban-refresh.log {
    monthly
    rotate 12
    compress
    missingok
    notifempty
    create 644 root root
}
