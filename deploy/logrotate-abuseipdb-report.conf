# logrotate konfigurace pro /var/log/abuseipdb-report.log.
# Měsíční rotace, 6 archivů (~6 měsíců historie).
#
# Umístění: /etc/logrotate.d/abuseipdb-report

/var/log/abuseipdb-report.log {
    monthly
    rotate 6
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
}
