# logrotate konfigurace pro /var/log/abuseipdb-report.log.
# Měsíční rotace, 6 archivů (~6 měsíců historie).
#
# Umístění: /etc/logrotate.d/abuseipdb-report

/var/log/abuseipdb-report.log {
    monthly
    rotate 6
    compress
    delaycompress
    missingok
    notifempty
    # root writes, group `app` (the PM2 user) reads it for the admin
    # blocklist page — without this the rotated log isn't app-readable.
    create 0640 root app
}
