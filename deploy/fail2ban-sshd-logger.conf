# Logger-only SSH jail — zaznamenává **každý** první neúspěšný login
# pokus do /var/log/fail2ban-blocklist.tsv pro audit, BEZ firewall banu.
# Skutečný ban má klasický [sshd] jail (5 pokusů → nftables blok).
#
# Proč to fungue: action obsahuje POUZE `blocklist` (custom logger),
# žádné `%(action_)s` → fail2ban nesahne na firewall, jen zavolá
# /usr/local/sbin/fail2ban-blocklist-append.sh, ten appendne řádek do
# TSV. Whitelist (`ignoreip` z [DEFAULT] v jail.local) platí globálně,
# tvoje home/mobile IP se nikdy nezaloguje.
#
# Bantime=60s = max 1 TSV entry za IP za minutu. Bez tohoto limitu by
# brute-force burst (50 pokusů za 5s) napsal 50 řádků; takhle 1.
#
# Umístění: /etc/fail2ban/jail.d/sshd-logger.local
#
# Po úpravě:
#   sudo fail2ban-client reload
#   sudo fail2ban-client status sshd-logger
#   sudo blocklist-tools.sh recent 10   # po 1-2 minutách už něco bude

[sshd-logger]
enabled  = true
port     = ssh
filter   = sshd
logpath  = %(sshd_log)s
backend  = %(sshd_backend)s
maxretry = 1
findtime = 60
bantime  = 60
action   = blocklist
