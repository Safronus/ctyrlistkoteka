# Stats subdoména: legacy /security.txt i RFC 9116 /.well-known/security.txt
# přesměrujeme na autoritativní kopii na hlavní doméně. RFC 9116 sekce 4
# explicitně povoluje cross-domain redirects, takže
# `Canonical: https://ctyrlistkoteka.cz/.well-known/security.txt` v cílovém
# souboru zůstává validní pro oba domény (apex i stats).
#
# Bez tohoto snippetu by stats vhost servíroval security.txt z GoatCounter
# upstreamu — ten je v legacy top-level lokaci a malformed (chybí
# Expires, Contact není URI). internet.nl to flagne.
#
# Použití (v server bloku stats vhostu, mimo location / blok):
#     include /etc/nginx/snippets/security-txt-redirect.conf;

location = /security.txt {
    return 301 https://ctyrlistkoteka.cz/.well-known/security.txt;
}

location = /.well-known/security.txt {
    return 301 https://ctyrlistkoteka.cz/.well-known/security.txt;
}
