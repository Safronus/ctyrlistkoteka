# Security headers — minimální hardening pro libovolný HTTPS server.
# Bezpečně použitelné jak na stats.ctyrlistkoteka.cz, tak hypoteticky
# na hlavní doméně (kde CSP s nonce posílá Next.js middleware — tento
# snippet záměrně CSP neobsahuje, aby nedocházelo ke kolizím; pokud
# bys ho potřeboval i na main vhostu, X-Frame-Options DENY pokrývá
# clickjacking i bez `frame-ancestors`).
#
# Použití (v server bloku):
#     include /etc/nginx/snippets/security-headers.conf;
#
# `always` zajistí, že hlavičky odejdou i na error responses (4xx/5xx)
# a u proxied requestů.

# HTTPS-only po 2 roky, vč. subdomén. Pokud bys chtěl HSTS preload
# (chrome built-in list), přidej `; preload` a submitni doménu na
# https://hstspreload.org — POZOR: preload je prakticky neodvolatelný,
# znamená závazek držet HTTPS na apexu i všech subdoménách napořád.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

# Server nastavený Content-Type je autoritativní; prohlížeč nesmí sniffit.
add_header X-Content-Type-Options "nosniff" always;

# Anti-clickjacking. Stats dashboard nemá důvod být v iframe.
add_header X-Frame-Options "DENY" always;

# Neunikne path info do referrer headeru přes cross-origin link.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Vypneme browser feature API, které stats UI nepotřebuje. Útočník
# v hypotetickém XSS by si tím nemohl zapnout webcam/mikrofon/GPS.
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
