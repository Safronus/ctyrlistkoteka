// Doplňková konfigurace pro unattended-upgrades. Doplňuje (NEpřepisuje)
// /etc/apt/apt.conf.d/50unattended-upgrades — soubory v
// /etc/apt/apt.conf.d/ se merge-loadují podle lexikografického pořadí.
//
// POZOR na sémantiku merge: skalární hodnoty (Automatic-Reboot, Mail, …)
// se přepisují — vyhrává poslední soubor, tedy tenhle. Seznamy
// (Allowed-Origins, Package-Blacklist) se ale APPENDUJÍ, nepřepisují.
// Proto se v logu objeví origins z 50* i z 52* dohromady.
//
// Cíl: automatické bezpečnostní aktualizace bez manuální intervence,
// ale BEZ rebootů (PM2/Postgres state se nesmí přerušit bez vědomí).
// Reboot plánuje vlastník ručně po kontrole stavu služeb.
//
// Prostředí: Ubuntu 25.10 "questing" (interim, podpora do 2026-07).
// Pozor: po EOL je nutný release upgrade, jinak přestanou chodit
// bezpečnostní záplaty úplně.
//
// Umístění na serveru: /etc/apt/apt.conf.d/52ctyrlistkoteka-unattended.conf
// (záměrně 52 = lexikograficky později než default 50.)
//
// Po instalaci ověřit dry-run:
//   sudo unattended-upgrade --dry-run --debug 2>&1 | head -50

// Security pocket + -updates. Duplicita se security z 50* nevadí,
// necháváme ji jako explicitní anchor pro auditovatelnost.
Unattended-Upgrade::Allowed-Origins {
    "${distro_id}:${distro_codename}-security";
    // -updates pocket obsahuje i ne-security backports — bezpečné
    // pro nginx CVE patche, které Ubuntu backportuje.
    "${distro_id}:${distro_codename}-updates";
};

// Co NIKDY nechceme auto-update.
//
// POZOR: vzory se matchují přes re.match(), tedy jako PREFIX (pokud
// nedáš "$" na konec). Historicky tu bylo "postgresql-16" a "postgis",
// jenže běží Postgres 17 a PostGIS balíček se jmenuje
// postgresql-17-postgis-3 — ani jeden vzor tedy nematchoval nic
// a obojí se aktualizovalo automaticky (odhaleno 2026-07-20).
//
// Řešení: verzově agnostický prefix "postgresql-", který pokryje
// postgresql-17, postgresql-client-17, postgresql-17-postgis-3
// i budoucí majory. Už nikdy nezestárne při upgradu.
Unattended-Upgrade::Package-Blacklist {
    // Postgres + PostGIS řešit ručně (major upgrade láme ABI rozšíření,
    // minor upgrade restartuje DB uprostřed provozu).
    "postgresql-";
    // Standalone postgis balíčky (postgis, postgis-gui) — ty prefix
    // "postgresql-" nechytí.
    "postgis";
    // Node přes nvm, ne přes apt — žádný apt nodejs balíček nemáme,
    // ale guard pro případ, že by se omylem nainstaloval.
    "nodejs";
    // Případné lock-in balíčky doplnit zde.
};

// Vyčistit nepoužívané závislosti automaticky — drží disk čistý při
// dlouhodobém běhu.
Unattended-Upgrade::Remove-Unused-Dependencies "true";
Unattended-Upgrade::Remove-New-Unused-Dependencies "true";
// Staré kernely uklízet taky — bez rebootů se jinak hromadí a /boot
// (typicky jen ~500 MB) se zaplní. Odstraní jen ty, které neběží.
Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";

// Reboot zakázat — vlastník provádí ručně po kontrole stavu PM2 +
// Postgres. Pending reboot pozná podle /var/run/reboot-required
// (zobrazuje se i v motd při SSH loginu).
Unattended-Upgrade::Automatic-Reboot "false";

// Mail při neúspěchu nebo když je potřeba reboot.
//
// POZOR: aktuálně NEFUNGUJE — na serveru není žádný MTA, takže
// unattended-upgrades jen denně loguje
//   ERROR: No /usr/bin/mail or /usr/sbin/sendmail
// a žádná notifikace nikam nedojde. Zapnutí vyžaduje:
//   sudo apt install mailutils
//   + /etc/aliases: root: safronus@gmail.com  (pak `sudo newaliases`)
// Do té doby je jediná notifikace o pending rebootu motd při loginu.
Unattended-Upgrade::Mail "root";
Unattended-Upgrade::MailReport "on-change";

// Logy — kompletní výstup do journalu pro audit, plus soubory
// v /var/log/unattended-upgrades/ (logrotate drží ~4 týdny).
Unattended-Upgrade::Verbose "true";
Unattended-Upgrade::SyslogEnable "true";
Unattended-Upgrade::SyslogFacility "daemon";
