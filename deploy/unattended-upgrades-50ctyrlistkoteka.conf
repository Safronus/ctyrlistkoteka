// Doplňková konfigurace pro unattended-upgrades. Doplňuje (NEpřepisuje)
// /etc/apt/apt.conf.d/50unattended-upgrades — soubory v
// /etc/apt/apt.conf.d/ se merge-loadují podle lexikografického pořadí.
//
// Cíl: automatické bezpečnostní aktualizace pro Ubuntu LTS bez nutnosti
// manuální intervence, ale BEZ rebootů (PM2/Postgres state se nesmí
// přerušit bez vědomí). Pokud kernel upgrade vyžaduje reboot, server
// pošle mail s informací (přes Unattended-Upgrade::Mail) a vlastník
// reboot naplánuje sám.
//
// Umístění: /etc/apt/apt.conf.d/52ctyrlistkoteka-unattended.conf
// (záměrně 52 = lexikograficky později než default 50, takže tyto
// override hodnoty vyhrávají při merge.)
//
// Po instalaci ověřit dry-run:
//   sudo unattended-upgrades --dry-run -d 2>&1 | head -50

// Povolit security updaty pro Ubuntu LTS (security pocket).
// Default na Ubuntu 24.04 už `${distro_id}:${distro_codename}-security`
// má — necháváme to znova jako anchor pro auditovatelnost.
Unattended-Upgrade::Allowed-Origins {
    "${distro_id}:${distro_codename}-security";
    // -updates pocket obsahuje i ne-security backports — bezpečné
    // pro nginx CVE patche, které Ubuntu backportuje.
    "${distro_id}:${distro_codename}-updates";
};

// Co NIKDY nechceme auto-update (kotví na konkrétní verze):
Unattended-Upgrade::Package-Blacklist {
    // Postgres major upgrade by porušil PostGIS kompatibilitu —
    // řešit ručně.
    "postgresql-16";
    "postgis";
    // Node přes nvm, ne přes apt — žádný apt nodejs balíček nemáme,
    // ale guard pro případ, že by se omylem nainstaloval.
    "nodejs";
    // Případné lock-in balíčky doplnit zde.
};

// Vyčistit nepoužívané závislosti automaticky — drží disk čistý při
// dlouhodobém běhu. apt autoremove jen jednou týdně (v cyklu cron-apt).
Unattended-Upgrade::Remove-Unused-Dependencies "true";
Unattended-Upgrade::Remove-New-Unused-Dependencies "true";

// Reboot zakázat — vlastník provádí ručně po kontrole stavu PM2 +
// Postgres. systemd-tmpfiles informuje přes
// /var/run/reboot-required po update kernelu — viz `motd`.
Unattended-Upgrade::Automatic-Reboot "false";

// Mail při neúspěchu nebo když je potřeba reboot. Vyžaduje `mailutils`
// + správně nakonfigurovaný `/etc/aliases` (root → safronus@gmail.com).
// Pokud mailutils nainstalovaný není, řádek je no-op (nepadá).
// DOPLŇ: skutečný email po instalaci.
Unattended-Upgrade::Mail "root";
Unattended-Upgrade::MailReport "on-change";

// Update timing — apt-daily timer běží 2× denně standardně. Pro náš
// případ stačí 1× v noci. Override v /etc/systemd/system/apt-daily*.d/.
// Tento config to neřeší — viz docs/deployment.md §X.

// Logy — kompletní výstup do journalu pro audit, plus retention
// 90 dní v /var/log/unattended-upgrades/.
Unattended-Upgrade::Verbose "true";
Unattended-Upgrade::SyslogEnable "true";
Unattended-Upgrade::SyslogFacility "daemon";
