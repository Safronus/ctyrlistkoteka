# fail2ban custom action — pouze loguje ban do TSV souboru, žádný
# firewall zásah (ten dělá samostatná akce na úrovni jail definice).
# Cílem je přežít log rotation a bantime expiraci, aby si vlastník
# mohl postupně budovat permanentní blocklist.
#
# Umístění souboru: /etc/fail2ban/action.d/blocklist.conf
# Po úpravě:        sudo fail2ban-client reload
#
# Použití v jail.d:
#   action = %(action_)s        ; default firewall ban (z jail.local)
#            blocklist           ; tato akce — log do TSV
#
# Pozn.: <ip>, <name>, <matches> jsou fail2ban tagy expandované runtime.
# `matches` je log line(s), který ban spustil — užitečné pro pozdější
# audit (proč byla IP banována).

[Definition]
actionstart =
actionstop =
actioncheck =
actionban   = /usr/local/sbin/fail2ban-blocklist-append.sh '<ip>' '<name>' '<matches>'
actionunban =

[Init]
# Žádné parametry, akce nepotřebuje konfiguraci za jail.
