# fail2ban override pro sshd jail — přidá náš `blocklist` logger
# k default firewall akci, takže každý SSH ban (5+ failed loginů
# z téže IP) skončí i v /var/log/fail2ban-blocklist.tsv pro audit
# a permaban list.
#
# `[sshd]` jail je defaultně zapnutý v /etc/fail2ban/jail.conf
# (debian/ubuntu balíček). Tenhle soubor jen rozšiřuje jeho action
# bez sahání na hlavní config (přežije package upgrade).
#
# Whitelisted IP (sám sebe) banovány nebudou — `ignoreip` v
# /etc/fail2ban/jail.local pokrývá tvůj home/mobile rozsah.
#
# Umístění:
#   /etc/fail2ban/jail.d/sshd.local
#
# Po úpravě:
#   sudo fail2ban-client reload
#   sudo fail2ban-client get sshd actions   # mělo by ukázat: nftables, blocklist
#   sudo fail2ban-client status sshd

[sshd]
action = %(action_)s
         blocklist
