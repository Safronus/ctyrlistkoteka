# fail2ban custom action — okamžitě přidá banovanou IP do nftables setu
# `permaban` (L3 drop). Náhrada za starou `permaban-nginx` action,
# která přidávala `deny <ip>;` do nginx config — to byl L7 drop, pomalý
# a CPU-žravý.
#
# Per-jail wiring: vlož `permaban-firewall` do action sekce jail
# definice (vedle `blocklist`, ne místo něj), např.:
#
#   [nginx-noscript]
#   action = %(action_)s
#            blocklist
#            permaban-firewall
#
# Pozn.: %(action_)s v jail.local je default banaction — pro pure
# nftables ji nastav na `nftables-multiport` (viz
# deploy/fail2ban-jail.local.example).
#
# Umístění souboru: /etc/fail2ban/action.d/permaban-firewall.conf
# Po úpravě:        sudo fail2ban-client reload
#
# Pozn.: <ip> je fail2ban tag expandovaný runtime na zabanovanou IP.

[Definition]
actionstart =
actionstop =
actioncheck =
actionban   = /usr/local/sbin/permaban-firewall-add.sh '<ip>'
actionunban =

[Init]
# Žádné parametry, akce nepotřebuje konfiguraci za jail.
