# Globální TLS hardening — omezí podpisové hash funkce pro TLS 1.2
# key exchange jen na SHA-256 a silnější. OpenSSL má v defaultu i
# SHA-224, který internet.nl označuje za "phase out" (vzácně používaný,
# slabší než SHA-256). SHA-1 a MD5 jsou už dávno vyřazeny.
#
# Aplikuje se v http {} kontextu, takže pokrývá všechny vhosty
# (apex i stats) automaticky bez nutnosti editovat každý.
#
# Umístění: /etc/nginx/conf.d/ssl-hardening.conf
# (Ubuntu nginx defaultně includuje /etc/nginx/conf.d/*.conf z http
# bloku v hlavním nginx.conf, takže žádné další úpravy nejsou potřeba.)
#
# Po úpravě:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Vyžaduje OpenSSL >= 1.1.1 a nginx >= 1.19.4. Ubuntu 24.04 LTS má
# obojí splněno (nginx 1.24+, OpenSSL 3.0+).

ssl_conf_command SignatureAlgorithms ECDSA+SHA256:ECDSA+SHA384:ECDSA+SHA512:RSA-PSS+SHA256:RSA-PSS+SHA384:RSA-PSS+SHA512:RSA+SHA256:RSA+SHA384:RSA+SHA512;
