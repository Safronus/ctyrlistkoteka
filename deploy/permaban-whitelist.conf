# IP, které se nikdy nesmí objevit v nginx permaban listu.
# Synchronizuj s `allow` direktivami v /etc/nginx/sites-available/ctyrlistkoteka
# (sekce `location /admin`) — když je sem pustíme nedopatřením přes deny,
# zablokujeme si přístup do adminu.
#
# ⚠️ TENTO SOUBOR JE JEN ŠABLONA (repo je VEŘEJNÝ). NEPIŠ sem reálné IP!
# Reálné adresy patří VÝHRADNĚ do /etc/permaban-whitelist.conf na VPS
# (README §"permaban-whitelist"): nakopíruj tuhle šablonu a pak do /etc
# doplň své skutečné IP. Do gitu se reálné IP nesmí dostat (soukromí +
# prozrazuje, kdo smí na /admin a SSH).
#
# Formát: jedna IP per řádek. Lines začínající '#' se ignorují, prázdné řádky
# taky. CIDR rozsahy (10.0.0.0/24) ZATÍM nejsou podporované — whitelist match
# je striktně exact-match.
#
# Soubor (na VPS: /etc/permaban-whitelist.conf) čte:
#   - blocklist-tools.sh (denní cron rebuild)
#   - permaban-nginx-add.sh (real-time z fail2ban action)

# Příklad (nahraď svými IP až v /etc/permaban-whitelist.conf na serveru):
# 203.0.113.10      # statická domácí IP
# 203.0.113.11      # záložní / mobil
