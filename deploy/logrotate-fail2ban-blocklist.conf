# logrotate konfigurace pro permanent blocklist TSV.
# Drží 12 měsíčních archivů (cca 1 rok historie); compresso po 1 měsíci.
# Bez `truncate` — append-only formát, žádný daemon, který by reloadoval.
#
# Umístění: /etc/logrotate.d/fail2ban-blocklist
# Test:     sudo logrotate -d /etc/logrotate.d/fail2ban-blocklist
# Spuštění: sudo logrotate -f /etc/logrotate.d/fail2ban-blocklist  (force)

/var/log/fail2ban-blocklist.tsv {
    monthly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
}
