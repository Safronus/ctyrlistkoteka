# fail2ban filter pro `nginx-noscript` jail.
# Umístění: /etc/fail2ban/filter.d/nginx-noscript.conf
#
# Match: požadavek z <HOST> na typickou exploit cestu, který Nginx
# dropnul (444), zahodil (404) nebo odmítl (403). Šestkrát během
# 60s → ban na hodinu.

[Definition]
failregex = ^<HOST> .* "(GET|POST|HEAD).*(\.env|\.git|\.aws|wp-(login|admin|content|includes|json)|xmlrpc\.php|phpmyadmin|administrator|adminer|setup\.php|install\.php|server-status|actuator).*" (444|404|403|400)
ignoreregex =
