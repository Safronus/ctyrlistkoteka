name: gitleaks

# Scan the repo (and full history on push) for accidentally committed
# secrets — API keys, tokens, passwords, private keys. The repo is public,
# so a leaked secret is exposed the moment it lands; this catches it in CI.
# gitleaks-action is free for personal/public repositories.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
