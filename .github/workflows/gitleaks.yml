name: gitleaks

# Scan the repo (and full history on push) for accidentally committed
# secrets — API keys, tokens, passwords, private keys. The repo is public,
# so a leaked secret is exposed the moment it lands; this catches it in CI.
# gitleaks-action is free for personal/public repositories.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # v3.0.0 is purely the Node 20 → Node 24 runtime migration: no change
      # to inputs, outputs, behaviour or licensing (an earlier note here
      # claimed otherwise — it was wrong). The bump is not optional: GitHub
      # flips runners to Node 24 on 2026-06-02 and removes Node 20 entirely
      # on 2026-09-16, after which v2 stops running at all.
      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
