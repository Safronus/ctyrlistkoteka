name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # One deploy at a time, but DON'T cancel an in-flight one — let it finish
  # and queue the next. Any interruption mid-`pnpm build` leaves a
  # half-written `.next` (no BUILD_ID): the live PM2 process keeps serving
  # its in-memory build so nothing looks wrong, but the next process
  # restart (reboot/crash) makes `next start` read the broken `.next` and
  # crash-loop with "Could not find a production build" → nginx 502.
  # `cancel-in-progress: false` removes the push-cancels-push trigger; the
  # other trigger is rebooting the VPS while a deploy is building (the
  # runner lives on the same box) — don't. See docs/gotchas.md #5.
  group: deploy-prod
  cancel-in-progress: false

jobs:
  check:
    name: Lint / typecheck / test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Prisma client is required for type checking the DB layer.
      - run: pnpm prisma generate

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

  deploy:
    name: Deploy to ctyrlistkoteka.cz
    needs: check
    # Self-hosted runner ON the VPS: it polls GitHub OUTBOUND over HTTPS,
    # so deploys no longer need inbound SSH and port 22 can stay
    # firewalled to the admin's IPs (deploy/nftables-ssh-allowlist.nft).
    # Runs locally as the `app` user that owns the app + PM2.
    #
    # ⚠️ SECURITY (public repo): this job must ONLY run on push to `main`
    # (forks can't push there). NEVER add a `pull_request` trigger to this
    # workflow — a fork's code would otherwise execute on the VPS runner.
    # Also: repo Settings → Actions → require approval for fork PRs.
    runs-on: self-hosted
    # A normal cold build is ~2–3 min; 25 gives huge headroom for an
    # occasional slow one. The point is to let a slow build FINISH: a
    # cancel mid-`pnpm build` (timeout or a superseding push) overwrites
    # .next/static half-way, so the still-running old process serves 404s
    # for its (now-deleted) hashed CSS/JS → the site renders unstyled until
    # the next successful deploy (exactly what happened 2026-07-08 at 15 min).
    # DeployHealthScript covers the user-facing symptom; this reduces how
    # often it triggers at all.
    timeout-minutes: 25
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy locally on the VPS
        run: |
          set -euo pipefail
          cd /var/www/ctyrlistkoteka
          # Deploy key for the SSH `origin` remote (public repo, so it's
          # only there to keep the existing remote URL working).
          export GIT_SSH_COMMAND="ssh -i /home/app/.ssh/github_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          git fetch --prune origin main
          git reset --hard origin/main
          source "/home/app/.nvm/nvm.sh"
          pnpm install --frozen-lockfile
          pnpm prisma generate
          pnpm prisma migrate deploy
          # Drop the persistent build cache before every build. A deploy
          # cancelled mid-build (concurrency: cancel-in-progress) can leave
          # .next/cache poisoned — observed 2026-06-09 as a CSS bundle
          # missing freshly-introduced Tailwind utilities (.top-1/.left-1)
          # while the HTML already used them (docs/gotchas.md #4). Only the
          # cache dir is removed: the runtime never serves from it, so this
          # is safe with the live app still running; it just costs a full
          # recompile per deploy.
          rm -rf .next/cache
          pnpm build

          # --- Build integrity gate ---------------------------------------
          # A build can exit 0 yet leave 0-byte manifests (observed
          # 2026-07-08: required-server-files.json, prerender-manifest.json
          # et al. all at 0 B → `next start` does JSON.parse("") on boot →
          # "Unexpected end of JSON input" → every worker crash-loops →
          # nginx 502). `set -e` + cancel-in-progress:false don't catch this
          # because the build didn't fail or get cancelled — it "succeeded"
          # broken. Refuse to reload onto it: fail the deploy so the running
          # PM2 workers keep serving their good in-memory build and this goes
          # RED, instead of shipping a landmine that detonates on the next
          # worker restart. See docs/gotchas.md #5.
          for f in .next/BUILD_ID \
                   .next/required-server-files.json \
                   .next/prerender-manifest.json \
                   .next/routes-manifest.json \
                   .next/build-manifest.json; do
            if [ ! -s "$f" ]; then
              echo "::error::Broken build: $f is missing or empty — refusing to reload." >&2
              exit 1
            fi
          done

          pm2 reload ctyrlistkoteka
          pm2 save

          # --- Post-reload health gate ------------------------------------
          # Confirm the reloaded workers actually serve HTTP before calling
          # the deploy done. Any 2xx/3xx (incl. the locale redirect) means
          # the Node process is up; 000/connection-refused or 5xx means it
          # isn't. Retry to let the rolling reload settle. Turns a bad reload
          # into a RED deploy now, not a 502 discovered hours later.
          for i in $(seq 1 10); do
            code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 http://127.0.0.1:3000/ || true)"
            case "$code" in
              2*|3*) echo "Health check OK (HTTP $code)"; break ;;
              *)
                if [ "$i" -eq 10 ]; then
                  echo "::error::App unhealthy after reload (last HTTP ${code:-000})." >&2
                  exit 1
                fi
                sleep 3
                ;;
            esac
          done
